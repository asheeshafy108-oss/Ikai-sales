<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join · ikai Sales</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Join the <span class="brand">team</span></h1>
      <p class="sub">You've been invited. Set up your account to get started.</p>
      <form id="joinForm">
        <label for="jn-name">Your name</label>
        <input id="jn-name" type="text" autocomplete="name" required />
        <label for="jn-email">Email</label>
        <input id="jn-email" type="email" autocomplete="email" required />
        <label for="jn-password">Password</label>
        <input id="jn-password" type="password" autocomplete="new-password" minlength="8" required />
        <button class="btn block" type="submit">Join</button>
      </form>
      <div class="msg" id="joinMsg"></div>
      <div class="toggle-row"><a href="/">Back to sign in</a></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const params = new URLSearchParams(location.search);
    const token = params.get("token");

    if (!token) {
      const m = $("joinMsg");
      m.className = "msg error";
      m.textContent = "This invite link is missing its token.";
      $("joinForm").classList.add("hidden");
    }

    $("joinForm").onsubmit = async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector("button");
      btn.disabled = true;
      const r = await fetch("/api/join", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({
          token,
          name: $("jn-name").value,
          email: $("jn-email").value,
          password: $("jn-password").value,
        }),
      });
      const data = await r.json().catch(() => ({}));
      btn.disabled = false;
      if (r.ok) location.href = "/app";
      else {
        const m = $("joinMsg");
        m.className = "msg error";
        m.textContent = data.error || "Could not join.";
      }
    };
  </script>
</body>
</html>
